AWSTemplateFormatVersion: '2010-09-09'
Description: 
  Study AWS associate
Resources: 
#  VPC
  eccubeVPC: 
    Type: "AWS::EC2::VPC"
    Properties:
      CidrBlock: 10.0.0.0/16
      Tags:
      - Key: Name
        Value: eccubeVPC
# IGW
  eccubeIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
      - Key: Name
        Value: eccubeVPC-IGW
# VPCをアタッチ
  eccubeAttachGW:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref eccubeVPC
      InternetGatewayId: !Ref eccubeIGW
# ルートテーブル設定
  eccubeRT:
    Type: AWS::EC2::RouteTable
    DependsOn: eccubeAttachGW
    Properties:
      VpcId: !Ref eccubeVPC
      Tags:
      - Key: Name
        Value: eccubeRT
# サブネット
  eccubeSN:
    Type: AWS::EC2::Subnet
    DependsOn: eccubeAttachGW
    Properties:
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: 'true'
      VpcId: !Ref eccubeVPC
      Tags:
      - Key: Name
        Value: eccubeSN
